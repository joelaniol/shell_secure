# AI Agent Secure Configuration (Shell-Secure core)
# ===========================

# Master switch (true/false) - aus = gar kein Schutz.
SHELL_SECURE_ENABLED=true

# Feingranulare Kategorien - nur wirksam wenn SHELL_SECURE_ENABLED=true.
# Delete-Schutz:  rm -rf, cmd /c rmdir /s, powershell Remove-Item -Recurse
SHELL_SECURE_DELETE_PROTECT=true
# Git-Schutz:     git stash capture/restore/ref-Mutationen ohne expliziten Bypass
SHELL_SECURE_GIT_PROTECT=true
# Git-Flood:      bremst durchdrehende Agents (max N Netzwerk-git-Calls pro Fenster).
SHELL_SECURE_GIT_FLOOD_PROTECT=true
SHELL_SECURE_GIT_FLOOD_THRESHOLD=4
SHELL_SECURE_GIT_FLOOD_WINDOW=60
# HTTP/API:       blockt authentifizierte curl-Calls mit destruktiver API-Semantik.
SHELL_SECURE_HTTP_API_PROTECT=true
# PS-UTF-8:       blockt PowerShell-Writes ohne -Encoding utf8 (Default 5.1 ist UTF-16 BOM).
SHELL_SECURE_PS_ENCODING_PROTECT=true

# Language for block messages and UI text (en/de, default en).
SHELL_SECURE_LANGUAGE=en

# Log file for blocked operations
SHELL_SECURE_LOG="$HOME/.shell-secure/blocked.log"

# Protected areas - recursive deletes in these trees will be blocked
# Use forward slashes, one entry per array element
# Fresh Windows installs add C:/ automatically when the drive exists.
SHELL_SECURE_PROTECTED_DIRS=(
)

# Safe directory names that CAN be recursively deleted (build artifacts etc.)
# Only the basename is checked, not the full path
SHELL_SECURE_SAFE_TARGETS=(
    "node_modules"
    "dist"
    "build"
    ".cache"
    "__pycache__"
    ".pytest_cache"
    ".next"
    ".nuxt"
    "coverage"
    ".nyc_output"
    ".tox"
    ".venv"
    "venv"
    "env"
    "target"
    ".gradle"
    "tmp"
    ".tmp"
    "temp"
    "out"
    ".output"
    "vendor"
    ".parcel-cache"
    ".turbo"
    ".angular"
    ".svelte-kit"
)
