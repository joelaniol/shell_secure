# AI Agent Secure Configuration (Shell-Secure core)
# ===========================

# Master switch (true/false) - false disables every protection layer.
SHELL_SECURE_ENABLED=true

# Fine-grained categories - only active when SHELL_SECURE_ENABLED=true.
# Delete protection: rm -rf, cmd /c rmdir /s, powershell Remove-Item -Recurse
SHELL_SECURE_DELETE_PROTECT=true
# Git protection: destructive stash/reset/clean/checkout/switch/restore/branch operations
SHELL_SECURE_GIT_PROTECT=true
# Git flood protection: rate-limit runaway agents (max N network git calls per window).
SHELL_SECURE_GIT_FLOOD_PROTECT=true
SHELL_SECURE_GIT_FLOOD_THRESHOLD=4
SHELL_SECURE_GIT_FLOOD_WINDOW=60
# Git leak protection: warn before pushing likely secret or agent workspace files.
SHELL_SECURE_GIT_LEAK_PROTECT=true
SHELL_SECURE_GIT_LEAK_TIMEOUT=60
# HTTP/API protection: block authenticated curl calls with destructive API semantics.
SHELL_SECURE_HTTP_API_PROTECT=true
# PS-UTF-8 protection: block PowerShell writes without explicit UTF-8 encoding.
SHELL_SECURE_PS_ENCODING_PROTECT=true

# GUI language preference (en/de, default en).
# Shell block diagnostics stay English/ASCII for agent-safe output.
SHELL_SECURE_LANGUAGE=en

# Log file for blocked operations
SHELL_SECURE_LOG="$HOME/.shell-secure/blocked.log"

# Protected areas - recursive deletes in these trees will be blocked
# Use forward slashes, one entry per array element
# Fresh Windows installs add C:/ automatically when the drive exists.
SHELL_SECURE_PROTECTED_DIRS=(
)

# Safe directory names that CAN be recursively deleted (build artifacts etc.)
# Only the basename is checked, not the full path
SHELL_SECURE_SAFE_TARGETS=(
    "node_modules"
    "dist"
    "build"
    ".cache"
    "__pycache__"
    ".pytest_cache"
    ".next"
    ".nuxt"
    "coverage"
    ".nyc_output"
    ".tox"
    ".venv"
    "venv"
    "env"
    "target"
    ".gradle"
    "tmp"
    ".tmp"
    "temp"
    "out"
    ".output"
    "vendor"
    ".parcel-cache"
    ".turbo"
    ".angular"
    ".svelte-kit"
)
